name: Integration

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-github:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Run live GitHub integration test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/integration-test.sh
